name: Update daily news signals

on:
  push:
    branches: [main]
    paths:
      - "scripts/update-news.mjs"
      - "scripts/update-news.test.mjs"
      - "scripts/check-news-freshness.mjs"
      - ".github/workflows/update-news.yml"
  schedule:
    # 08:17 and 14:17 Asia/Shanghai. Two off-peak attempts reduce GitHub cron delays.
    - cron: "17 0,6 * * *"
  workflow_dispatch:

concurrency:
  group: daily-content-updates
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test news collector
        run: node --test scripts/update-news.test.mjs

      - name: Generate news data
        run: node scripts/update-news.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Update daily news signals"
          git pull --rebase origin main
          git push

      - name: Verify fresh AI news
        run: node scripts/check-news-freshness.mjs
