name: Check exhibition page

on:
  push:
    branches: [main]
    paths:
      - "exhibitions.html"
      - "exhibitions.css"
      - "exhibitions.js"
      - "exhibitions-core.js"
      - "scripts/exhibitions-ui.test.mjs"
      - "scripts/update-xhs-exhibition-signals.mjs"
      - "scripts/update-xhs-exhibition-signals.test.mjs"
      - "scripts/serve-exhibitions-local.mjs"
      - "conventions.html"
      - "conventions.css"
      - "conventions.js"
      - "conventions-core.js"
      - "assets/conventions-anime-hero.jpg"
      - "data/conventions.json"
      - "scripts/conventions-ui.test.mjs"
      - "scripts/conventions-data.test.mjs"
      - "scripts/conventions-visual.test.mjs"
      - "scripts/update-conventions.mjs"
      - "scripts/update-conventions.test.mjs"
      - ".github/workflows/check-exhibition-page.yml"
      - ".github/workflows/update-conventions.yml"
  pull_request:
    paths:
      - "exhibitions.html"
      - "exhibitions.css"
      - "exhibitions.js"
      - "exhibitions-core.js"
      - "scripts/exhibitions-ui.test.mjs"
      - "scripts/update-xhs-exhibition-signals.mjs"
      - "scripts/update-xhs-exhibition-signals.test.mjs"
      - "scripts/serve-exhibitions-local.mjs"
      - "conventions.html"
      - "conventions.css"
      - "conventions.js"
      - "conventions-core.js"
      - "assets/conventions-anime-hero.jpg"
      - "data/conventions.json"
      - "scripts/conventions-ui.test.mjs"
      - "scripts/conventions-data.test.mjs"
      - "scripts/conventions-visual.test.mjs"
      - "scripts/update-conventions.mjs"
      - "scripts/update-conventions.test.mjs"
      - ".github/workflows/check-exhibition-page.yml"
      - ".github/workflows/update-conventions.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check scripts
        run: |
          node --check exhibitions-core.js
          node --check exhibitions.js
          node --check scripts/update-xhs-exhibition-signals.mjs
          node --check scripts/serve-exhibitions-local.mjs
          node --check conventions-core.js
          node --check conventions.js

      - name: Test exhibition interactions
        run: node --test scripts/exhibitions-ui.test.mjs scripts/update-xhs-exhibition-signals.test.mjs scripts/conventions-ui.test.mjs scripts/conventions-data.test.mjs scripts/conventions-visual.test.mjs scripts/update-conventions.test.mjs
