name: Update daily news signals

on:
  schedule:
    # 08:30 Asia/Shanghai, every day.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate news data
        run: node scripts/update-news.mjs

      - name: Commit updated news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Update daily news signals"
          git push